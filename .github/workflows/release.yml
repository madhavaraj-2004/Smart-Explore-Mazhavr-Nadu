name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to release (branch, tag, or commit SHA)"
        required: false
        default: "main"
      release_version:
        description: "Release version (example: v1.0.0)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend tests
        run: python -m unittest discover -s backend/tests -v

      - name: Upload release frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 30

  production-approval:
    name: Manual Production Approval
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://smart-explorer-mazhavarnadu.vercel.app

    steps:
      - name: Approval checkpoint
        run: |
          echo "Release candidate validated."
          echo "This job requires environment approval before continuing."

  production-release:
    name: Mark Production Release
    runs-on: ubuntu-latest
    needs: production-approval
    permissions:
      contents: write

    steps:
      - name: Create GitHub release for tag pushes
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Release summary
        run: |
          echo "Production approval granted."
          echo "If Vercel/Render auto-deploy from git is enabled, deployment is now in progress/completed."
